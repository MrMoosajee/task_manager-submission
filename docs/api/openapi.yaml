openapi: 3.0.0
info:
  title: User Identity API
  description: Handles user onboarding and registration logic.
  version: 1.1.0
paths:
  /api/users/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User created
        '400':
          description: Validation error (invalid email or weak password)
        '409':
          description: Conflict (User already exists)
        '500':
          description: Internal server error
